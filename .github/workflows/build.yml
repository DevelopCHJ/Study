name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build exe
        run: npm run packageExe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-file
          path: dist/*.exe
