name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 실행 권한
        run: chmod +x gradlew

      - name: packageExe 실행
        run: ./gradlew packageExe

      - name: EXE 업로드
        uses: actions/upload-artifact@v4
        with:
          name: Study-exe
          path: build/**/*.exe
